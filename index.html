<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Analyst PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050507; color: white; font-family: sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .danger-glow { border-color: #ef4444 !important; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .tab-btn.active { background: #ef4444; }
    </style>
</head>
<body class="p-4">

    <div id="mainUI" class="max-w-3xl mx-auto mt-10 transition-all">
        <h1 class="text-5xl font-black italic text-center mb-10">YT<span class="text-red-600">PRO</span></h1>
        
        <div id="searchBox" class="glass p-2 rounded-[2rem] flex flex-col md:flex-row gap-2 border border-white/10 transition-all">
            <input type="text" id="channelInput" placeholder="Kanal nomi yoki @handle..." class="flex-grow bg-transparent p-4 outline-none text-white">
            <button onclick="getStatistics()" id="searchBtn" class="bg-red-600 hover:bg-red-700 px-10 py-4 rounded-2xl font-bold uppercase transition">TAHLIL</button>
        </div>

        <div id="loading" class="hidden mt-10 text-center animate-pulse text-gray-500">Qidirilmoqda...</div>

        <div id="result" class="hidden mt-10 glass p-8 rounded-[2.5rem] animate-in fade-in duration-500">
            <div class="flex flex-col items-center gap-6">
                <img id="avatar" class="w-32 h-32 rounded-3xl border-4 border-red-600 object-cover shadow-2xl">
                <div class="text-center">
                    <h2 id="name" class="text-3xl font-bold"></h2>
                    <p id="handle" class="text-red-500 font-mono mt-1"></p>
                    <div id="stats" class="mt-4 flex gap-4 justify-center text-xs opacity-60 uppercase tracking-widest"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="adminModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4">
        <div class="glass w-full max-w-4xl h-[80vh] rounded-[2.5rem] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between bg-white/5 items-center">
                <h2 class="font-bold text-red-600 uppercase italic">Command Center</h2>
                <button onclick="closeAdmin()" class="text-xl">✕</button>
            </div>

            <div id="adminAuth" class="flex-grow flex flex-col items-center justify-center p-10">
                <input type="password" id="adminPass" placeholder="Password" class="bg-white/5 border border-white/10 p-4 rounded-xl text-center mb-4 outline-none focus:border-red-600 text-2xl tracking-widest">
                <button onclick="authAdmin()" class="bg-red-600 px-12 py-3 rounded-xl font-bold uppercase">KIRISH</button>
            </div>

            <div id="adminContent" class="hidden flex-grow flex overflow-hidden">
                <div class="w-48 border-r border-white/5 p-4 space-y-2 bg-black/20">
                    <button onclick="loadLogs(event)" class="tab-btn active w-full text-left p-3 rounded-xl text-[10px] font-bold uppercase">📊 LOGLAR</button>
                    <button onclick="showFilter(event)" class="tab-btn w-full text-left p-3 rounded-xl text-[10px] font-bold uppercase">📝 FILTR</button>
                    <button onclick="clearLocalBlock()" class="w-full border border-green-500/20 text-green-500 p-3 rounded-xl text-[9px] font-bold mt-10">🔓 O'ZIMNI OCHISH</button>
                </div>
                <div id="adminMain" class="flex-grow p-6 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <button onclick="openAdmin()" class="fixed bottom-4 right-4 opacity-5 text-[10px]">ADMIN</button>

    <script>
        let currentAdminPass = "";

        window.onload = checkBlock;

        function checkBlock() {
            const until = localStorage.getItem('blockUntil');
            const searchBtn = document.getElementById('searchBtn');
            const inputField = document.getElementById('channelInput');
            if (until && new Date().getTime() < until) {
                const min = Math.ceil((until - new Date().getTime()) / 60000);
                searchBtn.disabled = true;
                searchBtn.innerText = `BLOK (${min}m)`;
                searchBtn.classList.replace('bg-red-600', 'bg-gray-800');
                inputField.disabled = true;
                document.getElementById('searchBox').classList.add('danger-glow');
                return true;
            }
            return false;
        }

        async function getStatistics() {
            if (checkBlock()) return;
            const inputField = document.getElementById('channelInput');
            const input = inputField.value.trim();
            if (!input) return;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            try {
                const res = await fetch('/.netlify/functions/get-yt-data', {
                    method: 'POST',
                    body: JSON.stringify({ username: input })
                });
                const data = await res.json();

                if (res.status === 403) return alert("SERVER BLOKI!");

                // Oqlangan bo'lsa
                if (data.isWhitelisted) {
                    localStorage.clear();
                    location.reload();
                    return;
                }

                // Badword
                if (data.customBadwords && data.customBadwords.some(w => input.toLowerCase().includes(w.toLowerCase()))) {
                    return handleStrike(input);
                }

                if (data.channel) {
                    updateUI(data.channel);
                } else {
                    alert("Kanal topilmadi!");
                }
            } catch (e) {
                alert("Xato yuz berdi!");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function updateUI(c) {
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('name').innerText = c.snippet.title;
            document.getElementById('handle').innerText = c.snippet.customUrl || "";
            document.getElementById('avatar').src = c.snippet.thumbnails.high.url;
            document.getElementById('stats').innerText = `${parseInt(c.statistics.subscriberCount).toLocaleString()} subs • ${parseInt(c.statistics.videoCount).toLocaleString()} videos`;
        }

        function handleStrike(input) {
            let s = parseInt(localStorage.getItem('userStrikes') || '0') + 1;
            localStorage.setItem('userStrikes', s);
            if (s >= 3) {
                localStorage.setItem('blockUntil', new Date().getTime() + 3600000);
                alert("3-QOIDA BUZARLIK! 1 SOATGA BLOKLANDINGIZ.");
            } else {
                alert(`OGOHLANTIRISH ${s}/3! Badword ishlatmang.`);
            }
            fetch('/.netlify/functions/get-yt-data', { method: 'POST', body: JSON.stringify({ username: "🚨 STRIKE: " + input }) });
            checkBlock();
        }

        // --- ADMIN ---
        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
        
        function authAdmin() {
            const p = document.getElementById('adminPass').value;
            if (p === "YtAdmins") {
                currentAdminPass = p;
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadLogs();
            } else { alert("Xato!"); }
        }

        async function loadLogs(e) {
            if(e) toggleTab(e.target);
            const main = document.getElementById('adminMain');
            main.innerHTML = "Yuklanmoqda...";
            const res = await fetch('/.netlify/functions/get-yt-data', { method: 'POST', body: JSON.stringify({ action: 'get_logs', password: currentAdminPass }) });
            const logs = await res.json();
            main.innerHTML = logs.map(l => `
                <div class="glass p-4 rounded-2xl mb-2 flex justify-between items-center text-[10px]">
                    <div>
                        <b class="${l.channel_username.includes('🚨') ? 'text-red-500' : 'text-green-500'}">${l.channel_username}</b>
                        <p class="opacity-40">${l.ip_address} • ${new Date(l.created_at).toLocaleTimeString()}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="remoteAction('toggle_block', '${l.ip_address}')" class="text-red-500">BLOK</button>
                        <button onclick="remoteAction('whitelist_ip', '${l.ip_address}')" class="text-green-500">OCHISH</button>
                    </div>
                </div>
            `).join('');
        }

        function showFilter(e) {
            toggleTab(e.target);
            document.getElementById('adminMain').innerHTML = `
                <div class="glass p-6 rounded-3xl">
                    <input type="text" id="newWord" class="bg-white/5 p-3 rounded-xl w-full mb-3 outline-none border border-white/10" placeholder="Yangi so'z...">
                    <button onclick="addWord()" class="bg-green-600 w-full py-3 rounded-xl font-bold">QO'SHISH</button>
                </div>
            `;
        }

        async function addWord() {
            const word = document.getElementById('newWord').value;
            await fetch('/.netlify/functions/get-yt-data', { method: 'POST', body: JSON.stringify({ action: 'add_badword', password: currentAdminPass, word }) });
            alert("Qo'shildi!");
        }

        async function remoteAction(action, ip) {
            await fetch('/.netlify/functions/get-yt-data', { method: 'POST', body: JSON.stringify({ action, password: currentAdminPass, ip_address: ip }) });
            alert("Bajarildi!");
            loadLogs();
        }

        function toggleTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            t.classList.add('active');
        }

        function clearLocalBlock() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
