<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Analyst PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050507; color: white; font-family: system-ui, sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .danger-glow { border-color: #ef4444 !important; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        #result.hidden { display: none; }
        #loading.hidden { display: none; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-2xl mx-auto mt-10">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter">YT<span class="text-red-600">PRO</span></h1>
            <p class="text-gray-500 text-[10px] tracking-[0.3em] font-bold mt-2 uppercase">Global Analytics</p>
        </header>
        
        <div id="searchBox" class="glass p-2 rounded-[2rem] flex flex-col md:flex-row gap-2 transition-all">
            <input type="text" id="channelInput" placeholder="Kanal nomi yoki @handle..." 
                class="flex-grow bg-transparent p-4 outline-none text-white text-lg ml-2">
            <button onclick="getStatistics()" id="searchBtn" 
                class="bg-red-600 hover:bg-red-700 px-10 py-4 rounded-[1.5rem] font-bold uppercase transition active:scale-95">
                TAHLIL
            </button>
        </div>

        <div id="loading" class="hidden mt-10 text-center animate-pulse text-gray-500 font-mono text-xs">
            YouTube serverlaridan ma'lumot olinmoqda...
        </div>

        <div id="result" class="hidden mt-12 glass p-10 rounded-[2.5rem] animate-in fade-in duration-500">
            <div class="flex flex-col items-center gap-6">
                <img id="avatar" class="w-32 h-32 rounded-[2rem] border-4 border-red-600/20 object-cover shadow-2xl">
                <div class="text-center">
                    <h2 id="name" class="text-3xl font-black"></h2>
                    <p id="handle" class="text-red-500 font-mono text-sm mt-1"></p>
                    <div id="stats" class="mt-6 flex gap-4 justify-center text-[10px] font-bold uppercase tracking-widest text-gray-400">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div style="position: fixed; bottom: 15px; right: 15px; opacity: 0.15; font-size: 9px; cursor: pointer; color: #444; font-family: monospace;" 
         onclick="window.location.href='admin.html'">
        v1.1.2-stable
    </div>

    <script>
        async function getStatistics() {
            const inputField = document.getElementById('channelInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchBox = document.getElementById('searchBox');
            const input = inputField.value.trim();

            if (!input) return;

            // 1. Local Block tekshiruvi
            const blockUntil = localStorage.getItem('blockUntil');
            if (blockUntil && new Date().getTime() < blockUntil) {
                const diff = Math.ceil((blockUntil - new Date().getTime()) / 60000);
                alert(`Xavfsizlik tizimi: Siz ${diff} daqiqaga bloklangansiz!`);
                return;
            }

            // UI-ni tozalash
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            searchBox.classList.remove('danger-glow');

            try {
                const res = await fetch('/.netlify/functions/get-yt-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: input })
                });
                
                if (res.status === 403) {
                    alert("⚠️ IP manzilingiz server tomonidan bloklangan!");
                    return;
                }

                const data = await res.json();

                // 2. Admin oqlagan bo'lsa bloklarni yechish
                if (data.isWhitelisted) {
                    localStorage.removeItem('blockUntil');
                    localStorage.removeItem('userStrikes');
                }

                // 3. Badword (Taqiqlangan so'zlar) filtri
                if (data.badwords && data.badwords.some(word => input.toLowerCase().includes(word.toLowerCase()))) {
                    let strikes = parseInt(localStorage.getItem('userStrikes') || '0') + 1;
                    localStorage.setItem('userStrikes', strikes);
                    
                    if (strikes >= 3) {
                        const lockTime = new Date().getTime() + 1200000; // 20 min
                        localStorage.setItem('blockUntil', lockTime);
                        searchBox.classList.add('danger-glow');
                        alert("🚨 QOIDABUZARLIK! Ketma-ket 3 ta taqiqlangan so'z. 20 daqiqaga bloklandingiz!");
                    } else {
                        alert(`⚠️ Ogohlantirish: So'rovda taqiqlangan so'z mavjud! Strike: ${strikes}/3`);
                    }
                    return;
                }

                // 4. Natijani chiqarish
                if (data.channel) {
                    const c = data.channel;
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('name').innerText = c.snippet.title;
                    document.getElementById('handle').innerText = c.snippet.customUrl || "@" + input;
                    document.getElementById('avatar').src = c.snippet.thumbnails.high.url;
                    
                    const subCount = parseInt(c.statistics.subscriberCount).toLocaleString();
                    const videoCount = parseInt(c.statistics.videoCount).toLocaleString();
                    document.getElementById('stats').innerText = `${subCount} SUBS • ${videoCount} VIDEOS`;
                } else {
                    alert("Kanal topilmadi! @handle yoki nomni to'g'ri yozing.");
                }

            } catch (e) {
                console.error(e);
                alert("Server bilan ulanishda xatolik yuz berdi.");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // Enter tugmasini bosganda qidirish
        document.getElementById('channelInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') getStatistics();
        });
    </script>
</body>
</html>
