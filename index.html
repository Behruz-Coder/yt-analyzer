<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Pro Analyst - Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050507; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .admin-tab.active { background: #ef4444; color: white; }
        .badword-tag { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="userInterface" class="max-w-6xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold tracking-tighter uppercase italic">YT<span class="text-red-600">Analyst</span></h1>
            <p class="text-gray-500 text-[10px] tracking-[0.5em] mt-2">PREMIUM YOUTUBE INTELLIGENCE</p>
        </div>

        <div id="searchBox" class="glass p-4 rounded-3xl flex flex-col md:flex-row gap-4 mb-10 shadow-2xl">
            <input type="text" id="channelInput" placeholder="Kanal nomi yoki @handle..." 
                class="flex-grow bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-red-600 transition">
            <button onclick="getStatistics()" id="searchBtn" class="bg-red-600 hover:bg-red-700 px-10 py-4 rounded-2xl font-bold transition-all active:scale-95">TAHLIL</button>
        </div>

        <div id="loading" class="hidden text-center py-10 animate-pulse text-gray-500">Qidirilmoqda...</div>
        <div id="result" class="hidden space-y-6">
            <div class="glass p-8 rounded-[2.5rem] flex items-center gap-6">
                <img id="avatar" src="" class="w-24 h-24 rounded-2xl">
                <div>
                    <h2 id="name" class="text-3xl font-bold"></h2>
                    <p id="handle" class="text-red-500 font-mono"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="adminModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4">
        <div class="glass w-full max-w-5xl h-[80vh] rounded-[3rem] flex flex-col overflow-hidden">
            
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
                <div>
                    <h2 class="text-2xl font-black text-red-600 italic">SYSTEM CONTROL</h2>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Master Password Required</p>
                </div>
                <button onclick="closeAdmin()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">✕</button>
            </div>

            <div id="adminAuth" class="flex-grow flex flex-col items-center justify-center p-10">
                <input type="password" id="adminPassInput" placeholder="Password..." 
                    class="bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-2xl tracking-widest mb-4 w-full max-w-xs outline-none focus:border-red-600">
                <button onclick="checkAdminPass()" class="bg-red-600 px-12 py-4 rounded-2xl font-bold uppercase tracking-widest">KIRISH</button>
            </div>

            <div id="adminPanel" class="hidden flex-grow flex flex-col md:flex-row overflow-hidden">
                <div class="w-full md:w-64 border-r border-white/5 p-6 space-y-2">
                    <button onclick="showTab('logs')" class="admin-tab active w-full text-left p-4 rounded-xl text-sm font-bold transition">📊 Jonli Loglar</button>
                    <button onclick="showTab('security')" class="admin-tab w-full text-left p-4 rounded-xl text-sm font-bold transition">🚫 Bloklanganlar</button>
                    <button onclick="showTab('filter')" class="admin-tab w-full text-left p-4 rounded-xl text-sm font-bold transition">📝 So'z Filtri</button>
                </div>

                <div class="flex-grow p-8 overflow-y-auto">
                    <div id="tab-logs" class="tab-content space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold">Oxirgi qidiruvlar</h3>
                            <button onclick="loadLogs()" class="text-xs text-blue-500">Yangilash</button>
                        </div>
                        <div id="logList" class="space-y-2"></div>
                    </div>

                    <div id="tab-security" class="tab-content hidden space-y-4">
                        <h3 class="font-bold">Bloklangan IP manzillar</h3>
                        <div id="blockList" class="space-y-2 text-sm"></div>
                    </div>

                    <div id="tab-filter" class="tab-content hidden space-y-6">
                        <div>
                            <h3 class="font-bold mb-4">Yangi taqiqlangan so'z</h3>
                            <div class="flex gap-2">
                                <input type="text" id="newWordInput" class="flex-grow bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
                                <button onclick="addBadWord()" class="bg-green-600 px-6 rounded-xl font-bold">QO'SHISH</button>
                            </div>
                        </div>
                        <div id="badWordCloud" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button onclick="openAdmin()" class="fixed bottom-6 right-6 opacity-10 hover:opacity-100 text-[10px] font-mono">ADMIN_LOGIN</button>

    <script>
        let currentAdminPass = "";

        // --- ASOSIY FUNKSIYALAR ---
        async function getStatistics() {
            const input = document.getElementById('channelInput').value.trim();
            if(!input) return;

            // Avval mahalliy badwordni tekshirish (statik)
            const resBw = await fetch('badwords.json');
            const localBadWords = await resBw.json();
            
            // Backendga so'rov
            const res = await fetch('/.netlify/functions/get-yt-data', {
                method: 'POST',
                body: JSON.stringify({ username: input })
            });
            const data = await res.json();

            if(res.status === 403) {
                alert("❌ KIRISH TAQIQLANGAN: IP manzilingiz bloklangan!");
                return;
            }

            // Dinamik badwordlarni tekshirish
            const allBadWords = [...localBadWords, ...(data.customBadwords || [])];
            if(allBadWords.some(w => input.toLowerCase().includes(w.toLowerCase()))) {
                alert("⚠️ TAQIQLANGAN SO'Z!");
                return;
            }

            if(res.ok) updateUI(data.channel);
        }

        function updateUI(c) {
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('name').innerText = c.snippet.title;
            document.getElementById('handle').innerText = c.snippet.customUrl;
            document.getElementById('avatar').src = c.snippet.thumbnails.high.url;
        }

        // --- ADMIN FUNKSIYALARI ---
        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        function checkAdminPass() {
            const pass = document.getElementById('adminPassInput').value;
            if(pass === "YtAdmins") {
                currentAdminPass = pass;
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadLogs();
            } else { alert("Xato parol!"); }
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            event.target.classList.add('active');
            if(tabName === 'logs') loadLogs();
            if(tabName === 'filter') loadBadWords();
        }

        async function loadLogs() {
            const res = await fetch('/.netlify/functions/get-yt-data', {
                method: 'POST',
                body: JSON.stringify({ action: 'get_logs', password: currentAdminPass })
            });
            const logs = await res.json();
            const list = document.getElementById('logList');
            list.innerHTML = logs.map(l => `
                <div class="glass p-3 rounded-xl flex justify-between items-center text-[11px]">
                    <span class="font-bold text-red-500">${l.channel_username}</span>
                    <span class="text-gray-500">${l.ip_address}</span>
                    <button onclick="toggleBlock('${l.ip_address}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded">BLOKLASH</button>
                </div>
            `).join('');
        }

        async function toggleBlock(ip) {
            await fetch('/.netlify/functions/get-yt-data', {
                method: 'POST',
                body: JSON.stringify({ action: 'toggle_block', password: currentAdminPass, ip_address: ip })
            });
            alert("IP holati o'zgardi!");
            loadLogs();
        }

        async function addBadWord() {
            const word = document.getElementById('newWordInput').value;
            await fetch('/.netlify/functions/get-yt-data', {
                method: 'POST',
                body: JSON.stringify({ action: 'add_badword', password: currentAdminPass, word: word })
            });
            document.getElementById('newWordInput').value = "";
            alert("So'z qo'shildi!");
        }
    </script>
</body>
</html>
