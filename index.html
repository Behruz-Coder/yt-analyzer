<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Analyst PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top right, #1a1a2e, #050507); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .search-shadow { box-shadow: 0 0 40px rgba(239, 68, 68, 0.1); }
        .danger-glow { 
            border-color: #ef4444 !important; 
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3); 
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .tab-btn.active { background: #ef4444; color: white; transform: scale(1.05); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="mainUI" class="max-w-4xl mx-auto transition-all duration-700">
        <header class="text-center mb-16">
            <h1 class="text-6xl font-black italic tracking-tighter uppercase">
                YT<span class="text-red-600">PRO</span>
            </h1>
            <div class="h-1 w-20 bg-red-600 mx-auto mt-2 rounded-full"></div>
            <p class="text-gray-500 text-[10px] tracking-[0.5em] mt-4 uppercase font-bold">Intelligence System</p>
        </header>
        
        <div id="searchBox" class="glass p-2 rounded-[2.5rem] flex flex-col md:flex-row gap-2 border border-white/10 search-shadow transition-all duration-500">
            <input type="text" id="channelInput" placeholder="Kanal handle-ni kiriting (masalan: @MrBeast)" 
                class="flex-grow bg-transparent p-5 outline-none text-lg placeholder:text-gray-600">
            <button onclick="getStatistics()" id="searchBtn" 
                class="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-[2rem] font-black uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-red-600/20">
                TAHLIL
            </button>
        </div>

        <div id="loading" class="hidden mt-12 text-center">
            <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
        </div>

        <div id="result" class="hidden mt-12 animate-in fade-in slide-in-from-bottom-8 duration-1000">
            <div class="glass p-8 rounded-[3rem] flex flex-col md:flex-row items-center gap-10">
                <div class="relative">
                    <div class="absolute -inset-4 bg-red-600/20 blur-2xl rounded-full"></div>
                    <img id="avatar" src="" class="w-40 h-40 rounded-[2.5rem] border-4 border-white/10 relative z-10 object-cover shadow-2xl">
                </div>
                <div class="text-center md:text-left flex-grow">
                    <h2 id="name" class="text-4xl font-black tracking-tight mb-2"></h2>
                    <p id="handle" class="text-red-500 font-mono text-lg mb-4"></p>
                    <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                        <div class="bg-white/5 px-6 py-3 rounded-2xl border border-white/5 text-xs font-bold uppercase tracking-widest text-gray-400">
                            Verified Channel
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="adminModal" class="hidden fixed inset-0 bg-black/98 z-[100] flex items-center justify-center p-4 backdrop-blur-3xl">
        <div class="glass w-full max-w-5xl h-[90vh] rounded-[3.5rem] flex flex-col overflow-hidden shadow-[0_0_100px_rgba(239,68,68,0.15)]">
            
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
                <div>
                    <h2 class="text-2xl font-black text-red-600 italic uppercase tracking-tighter">Command Center</h2>
                    <p class="text-[9px] text-gray-500 uppercase tracking-[0.3em] font-bold">Admin Privileges Active</p>
                </div>
                <button onclick="closeAdmin()" class="w-12 h-12 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center transition text-2xl">✕</button>
            </div>

            <div id="adminAuth" class="flex-grow flex flex-col items-center justify-center p-10">
                <input type="password" id="adminPass" placeholder="••••••••" 
                    class="bg-white/5 border border-white/10 p-6 rounded-3xl text-center text-3xl tracking-[0.5em] mb-6 w-full max-w-xs outline-none focus:border-red-600 transition shadow-2xl">
                <button onclick="authAdmin()" class="bg-red-600 px-16 py-5 rounded-[2rem] font-black uppercase tracking-[0.2em] hover:bg-red-700 transition-all">DECRYPT</button>
            </div>

            <div id="adminContent" class="hidden flex-grow flex flex-col md:flex-row overflow-hidden">
                <div class="w-full md:w-72 border-r border-white/5 p-8 space-y-3 bg-black/40">
                    <button onclick="loadLogs(event)" class="tab-btn active w-full text-left p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">📊 LIVE LOGS</button>
                    <button onclick="showFilter(event)" class="tab-btn w-full text-left p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">📝 CONTENT FILTER</button>
                    <div class="pt-10">
                        <button onclick="clearLocalBlock()" class="w-full border border-green-500/30 text-green-500 p-5 rounded-2xl text-[9px] font-black uppercase tracking-widest hover:bg-green-500 hover:text-white transition-all">
                            🔓 SYSTEM OVERRIDE (Self)
                        </button>
                    </div>
                </div>
                <div id="adminMain" class="flex-grow p-10 overflow-y-auto bg-black/20">
                    </div>
            </div>
        </div>
    </div>

    <button onclick="openAdmin()" class="fixed bottom-8 right-8 opacity-5 hover:opacity-100 transition-opacity font-mono text-[9px] tracking-widest">SYS_ROOT_ACCESS</button>

    <script>
        let currentAdminPass = "";

        // Sahifa yuklanganda blokni tekshirish
        window.onload = checkBlock;

        function checkBlock() {
            const until = localStorage.getItem('blockUntil');
            const searchBtn = document.getElementById('searchBtn');
            const inputField = document.getElementById('channelInput');
            const searchBox = document.getElementById('searchBox');

            if (until && new Date().getTime() < until) {
                const min = Math.ceil((until - new Date().getTime()) / 60000);
                searchBtn.disabled = true;
                searchBtn.innerText = `BLOK (${min}m)`;
                searchBtn.classList.replace('bg-red-600', 'bg-gray-800');
                inputField.disabled = true;
                inputField.placeholder = "Xavfsizlik tizimi tomonidan bloklangansiz!";
                searchBox.classList.add('danger-glow');
                return true;
            }
            return false;
        }

        async function getStatistics() {
            if (checkBlock()) return;
            const input = document.getElementById('channelInput').value.trim();
            if (!input) return;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            try {
                const res = await fetch('/.netlify/functions/get-yt-data', {
                    method: 'POST',
                    body: JSON.stringify({ username: input })
                });
                const data = await res.json();

                if (res.status === 403) {
                    alert("IP BLOKLANGAN: Sizning qurilmangiz server tomonidan taqiqlangan!");
                    return;
                }

                // Global Unblock (Admin oqlagan bo'lsa)
                if (data.isWhitelisted) {
                    localStorage.removeItem('blockUntil');
                    localStorage.removeItem('userStrikes');
                    location.reload();
                    return;
                }

                // Badword tekshiruvi
                if (data.customBadwords && data.customBadwords.some(w => input.toLowerCase().includes(w.toLowerCase()))) {
                    handleStrike(input);
                    return;
                }

                if (data.channel) {
                    updateUI(data.channel);
                } else {
                    alert("Kanal topilmadi!");
                }
            } catch (e) {
                alert("Server xatosi!");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function updateUI(c) {
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('name').innerText = c.snippet.title;
            document.getElementById('handle').innerText = c.snippet.customUrl || "";
            document.getElementById('avatar').src = c.snippet.thumbnails.high.url;
        }

        function handleStrike(input) {
            let s = parseInt(localStorage.getItem('userStrikes') || '0') + 1;
            localStorage.setItem('userStrikes', s);
            
            if (s >= 3) {
                localStorage.setItem('blockUntil', new Date().getTime() + 3600000);
                alert("⚠️ TIZIM QULFLANDI!\nKetma-ket 3 ta qoidabuzarlik uchun 1 soatga bloklandingiz.");
            } else {
                alert(`⚠️ OGOHLANTIRISH (${s}/3)!\nTaqiqlangan so'zlardan foydalanmang.`);
            }
            
            fetch('/.netlify/functions/get-yt-data', { method: 'POST', body: JSON.stringify({ username: "🚨 STRIKE: " + input }) });
            checkBlock();
        }

        // --- ADMIN FUNKSIYALARI ---
        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        function authAdmin() {
            const p = document.getElementById('adminPass').value;
            if (p === "YtAdmins") {
                currentAdminPass = p;
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadLogs();
            } else { alert("ACCESS DENIED"); }
        }

        async function loadLogs(e) {
            if(e) toggleTab(e.target);
            const main = document.getElementById('adminMain');
            main.innerHTML = "<p class='animate-pulse text-gray-600'>Fetching data...</p>";
            
            const res = await fetch('/.netlify/functions/get-yt-data', { 
                method: 'POST', 
                body: JSON.stringify({ action: 'get_logs', password: currentAdminPass }) 
            });
            const logs = await res.json();
            
            main.innerHTML = `<h3 class='text-xl font-bold mb-6 italic'>Live Activity Logs</h3>` + 
                logs.map(l => `
                <div class="glass p-5 rounded-[2rem] mb-3 flex justify-between items-center border-white/5 hover:border-red-600/30 transition-all">
                    <div>
                        <span class="${l.channel_username.includes('🚨') ? 'text-red-500 font-black' : 'text-green-500 font-bold'}">${l.channel_username}</span>
                        <p class="text-[9px] text-gray-600 mt-1 uppercase tracking-widest">${l.ip_address} • ${new Date(l.created_at).toLocaleTimeString()}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="remoteAction('toggle_block', '${l.ip_address}')" class="bg-red-600/10 text-red-500 px-4 py-2 rounded-xl text-[9px] font-black hover:bg-red-600 hover:text-white transition">BLOCK</button>
                        <button onclick="remoteAction('whitelist_ip', '${l.ip_address}')" class="bg-green-600/10 text-green-500 px-4 py-2 rounded-xl text-[9px] font-black hover:bg-green-600 hover:text-white transition">RELEASE</button>
                    </div>
                </div>
            `).join('');
        }

        async function showFilter(e) {
            toggleTab(e.target);
            document.getElementById('adminMain').innerHTML = `
                <h3 class='text-xl font-bold mb-6 italic'>Content Filter Manager</h3>
                <div class="glass p-8 rounded-[2.5rem] border-white/10 mb-6">
                    <p class="text-[10px] text-gray-500 uppercase font-bold mb-4">Add new banned word</p>
                    <div class="flex gap-3">
                        <input type="text" id="newWord" class="flex-grow bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-red-600">
                        <button onclick="addNewWord()" class="bg-red-600 px-8 rounded-2xl font-black text-xs uppercase">ADD</button>
                    </div>
                </div>
            `;
        }

        async function addNewWord() {
            const word = document.getElementById('newWord').value;
            await fetch('/.netlify/functions/get-yt-data', { 
                method: 'POST', 
                body: JSON.stringify({ action: 'add_badword', password: currentAdminPass, word }) 
            });
            alert("So'z filtrga qo'shildi!");
            document.getElementById('newWord').value = "";
        }

        async function remoteAction(action, ip) {
            await fetch('/.netlify/functions/get-yt-data', { 
                method: 'POST', 
                body: JSON.stringify({ action, password: currentAdminPass, ip_address: ip }) 
            });
            alert("Success!");
            loadLogs();
        }

        function toggleTab(target) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            target.classList.add('active');
        }

        function clearLocalBlock() {
            localStorage.clear();
            alert("Local storage wiped! System rebooting...");
            location.reload();
        }
    </script>
</body>
</html>
