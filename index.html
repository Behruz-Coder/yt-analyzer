<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN v2.5 | Ultimate Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-titan-bg text-titan-text transition-colors duration-500">
    <nav class="p-5 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-opacity-80 backdrop-blur-lg z-50">
        <div class="text-3xl font-black text-red-600 tracking-tighter">TITAN <span class="text-xs text-gray-500">v2.5</span></div>
        <div class="flex items-center gap-5">
            <select id="langSwitcher" class="bg-transparent border border-gray-700 rounded-lg p-1 text-sm outline-none">
                <option value="uz-lat">O'zbek (Lotin)</option>
                <option value="uz-kir">Ўзбек (Кирилл)</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
            <button id="themeToggle" class="text-xl hover:scale-110 transition">🌙</button>
            <div id="authArea">
                <a href="auth.html" id="loginBtn" class="px-5 py-2 border border-red-600 rounded-full text-sm font-bold hover:bg-red-600 transition">Sign In</a>
            </div>
        </div>
    </nav>

    <header class="py-24 text-center container mx-auto px-4">
        <h1 class="text-6xl md:text-8xl font-black mb-8 animate-pulse">YouTube <span class="text-red-600">Faktlar</span></h1>
        <div class="max-w-3xl mx-auto relative group">
            <input type="text" id="searchInput" placeholder="Kanal nomi yoki handle..." 
                   class="w-full p-6 rounded-2xl bg-gray-900/50 border-2 border-red-600 focus:outline-none focus:ring-8 focus:ring-red-600/10 text-xl transition-all">
            <div id="searchDropdown" class="hidden absolute top-full left-0 w-full bg-[#0a0a0c] border border-gray-800 rounded-2xl mt-4 shadow-2xl z-50 overflow-hidden">
                </div>
        </div>
    </header>

    <script src="main.js"></script>
</body>
</html>
