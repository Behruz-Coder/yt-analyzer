<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Analyst PRO - Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050507; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .admin-tab.active { background: #ef4444; color: white; }
        .danger-glow { box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); border-color: #ef4444 !important; }
    </style>
</head>
<body class="p-6">

    <div id="mainUI" class="max-w-4xl mx-auto mt-10">
        <h1 class="text-4xl font-black text-center mb-10 italic uppercase">YT<span class="text-red-600">Analyst</span></h1>
        
        <div id="searchBox" class="glass p-4 rounded-3xl flex gap-3 border border-white/10 transition-all duration-500">
            <input type="text" id="channelInput" placeholder="Kanal @handle..." class="flex-grow bg-transparent p-3 outline-none">
            <button onclick="getStatistics()" id="searchBtn" class="bg-red-600 px-8 py-3 rounded-2xl font-bold">TAHLIL</button>
        </div>

        <div id="result" class="hidden mt-10 glass p-8 rounded-[2rem] text-center">
            <img id="avatar" class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-red-600">
            <h2 id="name" class="text-2xl font-bold"></h2>
            <p id="handle" class="text-red-500"></p>
        </div>
    </div>

    <div id="adminModal" class="hidden fixed inset-0 bg-black/95 z-[100] p-6 flex items-center justify-center">
        <div class="glass w-full max-w-4xl h-[80vh] rounded-[3rem] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between bg-white/5">
                <h2 class="font-bold text-red-600 uppercase">Master Control</h2>
                <button onclick="closeAdmin()">✕</button>
            </div>

            <div id="adminAuth" class="flex-grow flex flex-col items-center justify-center p-10">
                <input type="password" id="adminPass" placeholder="Password" class="bg-white/5 border border-white/10 p-4 rounded-xl text-center mb-4 outline-none focus:border-red-600">
                <button onclick="authAdmin()" class="bg-red-600 px-10 py-3 rounded-xl font-bold">KIRISH</button>
            </div>

            <div id="adminContent" class="hidden flex-grow flex overflow-hidden">
                <div class="w-48 border-r border-white/5 p-4 space-y-2">
                    <button onclick="loadLogs()" class="w-full text-left p-3 rounded-xl text-xs font-bold hover:bg-white/5">📊 LOGLAR</button>
                    <button onclick="showFilter()" class="w-full text-left p-3 rounded-xl text-xs font-bold hover:bg-white/5">📝 FILTR</button>
                    <button onclick="clearLocalBlock()" class="w-full text-left p-3 rounded-xl text-[10px] text-green-500 font-bold border border-green-500/20 mt-10">🔓 O'ZIMNI OCHISH</button>
                </div>
                <div id="adminMain" class="flex-grow p-6 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <button onclick="openAdmin()" class="fixed bottom-4 right-4 opacity-5 text-[10px]">ADMIN</button>

    <script>
        let adminPass = "";

        window.onload = checkBlock;

        function checkBlock() {
            const until = localStorage.getItem('blockUntil');
            if (until && new Date().getTime() < until) {
                const min = Math.ceil((until - new Date().getTime()) / 60000);
                document.getElementById('searchBtn').disabled = true;
                document.getElementById('searchBtn').innerText = `BLOK (${min}m)`;
                document.getElementById('channelInput').disabled = true;
                document.getElementById('searchBox').classList.add('danger-glow');
                return true;
            }
            return false;
        }

        async function getStatistics() {
            if (checkBlock()) return;
            const input = document.getElementById('channelInput').value.trim();
            if (!input) return;

            const res = await fetch('/.netlify/functions/get-yt-data', {
                method: 'POST',
                body: JSON.stringify({ username: input })
            });
            const data = await res.json();

            if (res.status === 403) return alert("IP BLOKLANGAN!");

            // Masofaviy Unblock tekshiruvi
            if (data.isWhitelisted) {
                localStorage.removeItem('blockUntil');
                localStorage.removeItem('userStrikes');
                location.reload();
            }

            // Badword tekshiruvi
            if (data.customBadwords.some(w => input.toLowerCase().includes(w.toLowerCase()))) {
                return handleStrike(input);
            }

            if (data.channel) {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('name').innerText = data.channel.snippet.title;
                document.getElementById('handle').innerText = data.channel.snippet.customUrl;
                document.getElementById('avatar').src = data.channel.snippet.thumbnails.high.url;
            }
        }

        function handleStrike(input) {
            let s = parseInt(localStorage.getItem('userStrikes') || '0') + 1;
            localStorage.setItem('userStrikes', s);
            if (s >= 3) {
                localStorage.setItem('blockUntil', new Date().getTime() + 3600000);
                alert("1 SOATGA BLOKLANDINGIZ!");
            } else {
                alert(`OGOHLANTIRISH ${s}/3!`);
            }
            fetch('/.netlify/functions/get-yt-data', { method: 'POST', body: JSON.stringify({ username: "🚨 STRIKE: " + input }) });
            checkBlock();
        }

        // --- ADMIN ---
        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
        
        function authAdmin() {
            if (document.getElementById('adminPass').value === "YtAdmins") {
                adminPass = "YtAdmins";
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadLogs();
            } else { alert("Xato!"); }
        }

        async function loadLogs() {
            const res = await fetch('/.netlify/functions/get-yt-data', { method: 'POST', body: JSON.stringify({ action: 'get_logs', password: adminPass }) });
            const logs = await res.json();
            document.getElementById('adminMain').innerHTML = logs.map(l => `
                <div class="glass p-3 rounded-xl mb-2 flex justify-between items-center text-[11px]">
                    <span>${l.channel_username} (${l.ip_address})</span>
                    <div class="flex gap-2">
                        <button onclick="remoteAction('toggle_block', '${l.ip_address}')" class="text-red-500">BLOK</button>
                        <button onclick="remoteAction('whitelist_ip', '${l.ip_address}')" class="text-green-500 font-bold">OQLASH</button>
                    </div>
                </div>
            `).join('');
        }

        async function remoteAction(action, ip) {
            await fetch('/.netlify/functions/get-yt-data', { method: 'POST', body: JSON.stringify({ action, password: adminPass, ip_address: ip }) });
            alert("Bajarildi!");
            loadLogs();
        }

        function clearLocalBlock() {
            localStorage.clear();
            alert("Lokal blok olindi!");
            location.reload();
        }
    </script>
</body>
</html>
