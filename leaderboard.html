<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Global Leaderboard | TITAN v2.5</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050507] text-white">
    <div class="container mx-auto py-20 px-4">
        <h1 class="text-5xl font-black text-center mb-16">TOP <span class="text-red-600">CHANNELS</span></h1>
        
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/10 text-gray-500 uppercase text-xs tracking-widest">
                        <th class="p-4">O'rin</th>
                        <th class="p-4">Kanal</th>
                        <th class="p-4">Obunachilar</th>
                        <th class="p-4">Videolar</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Oldindan belgilangan Top kanallar ID lari
        const topChannels = ['UCX6OQ3DkcsbYNE6H8uQQuVA', 'UC_x5XG1OV2P6uYZ5FHSzXNg']; // Misol

        async function fetchLeaderboard() {
            const body = document.getElementById('leaderboardBody');
            const res = await fetch(`/.netlify/functions/get-data?type=leaderboard&idList=${topChannels.join(',')}`);
            const data = await res.json();

            body.innerHTML = data.items.map((ch, index) => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="p-4 font-black text-2xl text-gray-700">#${index+1}</td>
                    <td class="p-4 flex items-center gap-4">
                        <img src="${ch.snippet.thumbnails.default.url}" class="w-12 h-12 rounded-xl">
                        <span class="font-bold">${ch.snippet.title}</span>
                    </td>
                    <td class="p-4 font-mono text-red-500">${parseInt(ch.statistics.subscriberCount).toLocaleString()}</td>
                    <td class="p-4 text-gray-400">${ch.statistics.videoCount}</td>
                    <td class="p-4">
                        <button onclick="location.href='index.html?id=${ch.id}'" class="bg-white/10 px-4 py-1 rounded-full text-xs">Analyze</button>
                    </td>
                </tr>
            `).join('');
        }
        fetchLeaderboard();
    </script>
</body>
</html>
