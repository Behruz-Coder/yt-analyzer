<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reyting | TITAN v2.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-titan-bg text-titan-text min-h-screen pb-20">

    <nav class="fixed top-0 w-full z-[100] border-b border-white/5 backdrop-blur-xl bg-black/20 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center">
                <span class="text-white font-black text-xl">T</span>
            </div>
            <span class="text-2xl font-black tracking-tighter uppercase hidden sm:block">Titan <span class="text-red-600">Ranking</span></span>
        </div>

        <div id="navMenu" class="hidden lg:flex items-center gap-8 text-[10px] font-black uppercase tracking-widest text-gray-400">
            <a href="index.html" class="hover:text-red-600 transition">Asosiy</a>
            <a href="search.html" class="hover:text-red-600 transition">Qidiruv</a>
            <a id="adminLink" href="admin.html" class="hidden text-yellow-500 border-b border-yellow-500">Admin</a>
        </div>

        <div class="flex items-center gap-4">
            <button id="themeToggle" class="w-10 h-10 rounded-xl border border-white/10 flex items-center justify-center">🌙</button>
            <button id="mobileMenuBtn" class="lg:hidden text-2xl w-10 h-10 flex items-center justify-center">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="pt-32 container mx-auto px-6">
        
        <section class="mb-20 text-center animate-fade">
            <div class="inline-block px-4 py-1 bg-red-600/10 border border-red-600/20 rounded-full text-[9px] font-black text-red-600 uppercase tracking-[0.3em] mb-6">
                Beta Feature
            </div>
            <h2 class="text-4xl md:text-6xl font-black mb-6 tracking-tighter">BATTLE <span class="text-red-600">MODE</span></h2>
            <p class="text-gray-500 text-sm max-w-lg mx-auto mb-10">Ikkita kanal ID sini kiriting va ularning o'sish ko'rsatkichlarini yonma-yon solishtiring.</p>
            
            <div class="flex flex-col md:flex-row items-center justify-center gap-4 max-w-3xl mx-auto">
                <input type="text" id="battleId1" placeholder="1-Kanal ID" class="w-full md:flex-1 p-5 rounded-2xl text-sm font-bold">
                <div class="text-2xl font-black text-red-600 italic opacity-40">VS</div>
                <input type="text" id="battleId2" placeholder="2-Kanal ID" class="w-full md:flex-1 p-5 rounded-2xl text-sm font-bold">
                <button onclick="startBattle()" class="btn-primary w-full md:w-auto px-10 py-5 text-[10px] tracking-widest">JANGNI BOSHLASH</button>
            </div>
        </section>

        <section class="titan-card overflow-hidden">
            <div class="p-8 border-b border-white/5 flex flex-col sm:flex-row justify-between items-center gap-4 bg-white/[0.01]">
                <div>
                    <h3 class="text-lg font-black uppercase tracking-widest">Global Top Kanallar</h3>
                    <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-widest">Obunachilar soni bo'yicha saralangan</p>
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-green-500/10 rounded-full">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[9px] font-black text-green-500 uppercase tracking-widest">Live Update</span>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="text-[10px] text-gray-500 uppercase tracking-[0.2em] border-b border-white/5 bg-white/[0.02]">
                            <th class="p-6">O'rin</th>
                            <th class="p-6">Kanal Ma'lumotlari</th>
                            <th class="p-6">Obunachilar</th>
                            <th class="p-6 text-center">Tahlil</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <tr>
                            <td colspan="4" class="p-20 text-center opacity-30">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="w-10 h-10 border-2 border-red-600 border-t-transparent rounded-full animate-spin"></div>
                                    <span class="text-[10px] font-black tracking-widest">YUKLANMOQDA...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
    <script>
        // Oldindan belgilangan TOP kanallar ro'yxati (IDs)
        const topChannelIds = "UCX6OQ3DkcsbYNE6H8uQQuVA,UCq-Fj5jknLsUf-MWSy4_brA,UCpEhnqL0y41EpW2TvWAHD7Q,UCk8GzjMOr686n87BqsS8u-A,UC-lHJZR3Gqxm24_Vd_AJ5Yw";

        async function initLeaderboard() {
            const body = document.getElementById('leaderboardBody');
            
            try {
                const res = await fetch(`/.netlify/functions/get-data?type=leaderboard&idList=${topChannelIds}`);
                const data = await res.json();
                
                body.innerHTML = '';
                
                // Obunachilar soni bo'yicha saralash
                const sorted = data.items.sort((a, b) => b.statistics.subscriberCount - a.statistics.subscriberCount);

                sorted.forEach((ch, index) => {
                    body.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors group">
                            <td class="p-6 font-black text-2xl text-gray-700 group-hover:text-red-600 transition-colors">#${index + 1}</td>
                            <td class="p-6">
                                <div class="flex items-center gap-4">
                                    <img src="${ch.snippet.thumbnails.default.url}" class="w-12 h-12 rounded-xl border border-white/10 group-hover:border-red-600/50 transition-all">
                                    <div class="overflow-hidden">
                                        <h4 class="font-bold text-sm truncate">${ch.snippet.title}</h4>
                                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">${ch.snippet.country || 'GLOBAL'}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="p-6">
                                <div class="font-mono text-sm font-bold">${formatNumber(ch.statistics.subscriberCount)}</div>
                                <div class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">Subscribers</div>
                            </td>
                            <td class="p-6 text-center">
                                <button onclick="location.href='app.html?id=${ch.id}'" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 hover:bg-red-600 hover:text-white transition-all">
                                    <i class="fas fa-chart-pie"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                body.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500 font-bold">Ma\'lumot yuklashda xatolik!</td></tr>';
            }
        }

        function startBattle() {
            const id1 = document.getElementById('battleId1').value.trim();
            const id2 = document.getElementById('battleId2').value.trim();
            
            if (!id1 || !id2) {
                alert("Iltimos, ikkala kanal ID sini ham kiriting!");
                return;
            }
            
            // Battle funksiyasi (Siz buni app.html ga o'xshash qilib alohida battle.html qilsangiz ham bo'ladi)
            alert("Battle Mode xususiyati keyingi yangilanishda to'liq ishga tushadi!");
        }

        window.onload = initLeaderboard;
    </script>
</body>
</html>
