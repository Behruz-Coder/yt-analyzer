<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qidiruv | TITAN v2.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-titan-bg text-titan-text min-h-screen pb-20">

    <nav class="fixed top-0 w-full z-[100] border-b border-white/5 backdrop-blur-xl bg-black/20 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center">
                <span class="text-white font-black text-xl">T</span>
            </div>
            <span class="text-2xl font-black tracking-tighter uppercase hidden sm:block">Titan <span class="text-red-600">Search</span></span>
        </div>

        <div id="navMenu" class="hidden lg:flex items-center gap-8 text-[10px] font-black uppercase tracking-widest text-gray-400">
            <a href="index.html" class="hover:text-red-600 transition">Asosiy</a>
            <a href="leaderboard.html" class="hover:text-red-600 transition">Reyting</a>
            <a id="adminLink" href="admin.html" class="hidden text-yellow-500 border-b border-yellow-500">Admin</a>
        </div>

        <div class="flex items-center gap-4">
            <button id="themeToggle" class="w-10 h-10 rounded-xl border border-white/10 flex items-center justify-center">🌙</button>
            <button id="mobileMenuBtn" class="lg:hidden text-2xl w-10 h-10 flex items-center justify-center">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <header class="pt-32 pb-12 px-6 text-center animate-fade">
        <h1 class="text-4xl md:text-6xl font-black mb-8 tracking-tighter">Kanalni <span class="text-red-600">Toping</span></h1>
        
        <div class="max-w-3xl mx-auto relative group">
            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-red-600 transition-colors"></i>
            <input type="text" id="searchInput" 
                   placeholder="Kanal nomi yoki ID sini yozing..." 
                   class="w-full pl-16 pr-36 py-6 rounded-[2rem] bg-white/5 border border-white/10 text-lg outline-none focus:border-red-600 focus:bg-white/10 transition-all shadow-2xl">
            <button onclick="performSearch()" 
                    class="absolute right-3 top-1/2 -translate-y-1/2 bg-red-600 text-white px-8 py-4 rounded-[1.5rem] font-black text-xs tracking-widest hover:bg-red-700 transition-all active:scale-95 shadow-lg shadow-red-600/20">
                QIDIRISH
            </button>
        </div>
        
        <div id="searchHistory" class="mt-8 flex flex-wrap justify-center gap-3 opacity-60">
            </div>
    </header>

    <main class="container-custom mx-auto px-6">
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">Ma'lumotlar olinmoqda...</p>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20 border-2 border-dashed border-white/5 rounded-[2rem] opacity-20">
                <i class="fas fa-cloud-sun text-5xl mb-4"></i>
                <p class="text-sm font-bold">Hali qidiruv amalga oshirilmadi</p>
            </div>
        </div>
    </header>

    <footer class="mt-20 py-10 border-t border-white/5 text-center">
        <p class="text-[9px] font-black text-gray-600 uppercase tracking-widest">&copy; 2026 TITAN v2.5 ENGINE</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
