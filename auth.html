<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | TITAN v2.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-titan-bg text-titan-text min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-red-600/10 blur-[120px] rounded-full z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/5 blur-[120px] rounded-full z-0"></div>

    <div class="titan-card w-full max-w-[450px] p-8 md:p-12 relative z-10 animate-fade">
        <div class="flex justify-center mb-10">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
                <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center shadow-lg shadow-red-600/30">
                    <span class="text-white font-black text-2xl">T</span>
                </div>
                <span class="text-3xl font-black tracking-tighter">TITAN <span class="text-red-600">v2.5</span></span>
            </div>
        </div>

        <div class="flex bg-white/5 p-1 rounded-2xl mb-8 border border-white/5">
            <button id="tabLogin" onclick="switchAuth('login')" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 bg-red-600 text-white shadow-lg shadow-red-600/20">
                SIGN IN
            </button>
            <button id="tabSignup" onclick="switchAuth('signup')" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 text-gray-400 hover:text-white">
                SIGN UP
            </button>
        </div>

        <div id="loginForm" class="space-y-5">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold" data-i18n="loginWelcome">Xush kelibsiz!</h2>
                <p class="text-gray-500 text-xs mt-1">Ma'lumotlarni boshqarish uchun kiring</p>
            </div>
            
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="email" id="emailLogin" placeholder="Email manzilingiz" class="w-full pl-12 pr-4 py-4 rounded-2xl outline-none transition-all">
            </div>

            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="password" id="passLogin" placeholder="Parolingiz" class="w-full pl-12 pr-4 py-4 rounded-2xl outline-none transition-all">
            </div>

            <div class="flex justify-between items-center text-[11px] px-1">
                <label class="flex items-center gap-2 cursor-pointer opacity-60 hover:opacity-100 transition">
                    <input type="checkbox" class="accent-red-600"> Eslab qolish
                </label>
                <a href="#" class="text-red-600 font-bold hover:underline">Parolni unutdingizmi?</a>
            </div>

            <button onclick="handleLogin()" class="btn-primary w-full py-4 text-sm mt-4">
                KIRISH <i class="fas fa-arrow-right ml-2 text-[10px]"></i>
            </button>
        </div>

        <div id="signupForm" class="space-y-5 hidden">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold">Hisob yaratish</h2>
                <p class="text-gray-500 text-xs mt-1">TITAN v2.5 hamjamiyatiga qo'shiling</p>
            </div>

            <div class="relative">
                <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="text" id="nameReg" placeholder="To'liq ismingiz" class="w-full pl-12 pr-4 py-4 rounded-2xl outline-none transition-all">
            </div>

            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="email" id="emailReg" placeholder="Email manzilingiz" class="w-full pl-12 pr-4 py-4 rounded-2xl outline-none transition-all">
            </div>

            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="password" id="passReg" placeholder="Murakkab parol yarating" class="w-full pl-12 pr-4 py-4 rounded-2xl outline-none transition-all">
            </div>

            <button onclick="handleSignup()" class="btn-primary w-full py-4 text-sm mt-4 bg-blue-600 shadow-blue-600/20">
                RO'YXATDAN O'TISH <i class="fas fa-user-plus ml-2 text-[10px]"></i>
            </button>
        </div>

        <div class="mt-10">
            <div class="relative flex items-center gap-4 mb-6">
                <div class="flex-1 h-[1px] bg-white/5"></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase tracking-widest">Yoki davom eting</span>
                <div class="flex-1 h-[1px] bg-white/5"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-3 py-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition text-xs font-bold">
                    <img src="https://www.svgrepo.com/show/303108/google-icon-logo.svg" class="w-4 h-4"> Google
                </button>
                <button class="flex items-center justify-center gap-3 py-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition text-xs font-bold">
                    <i class="fab fa-github text-lg"></i> GitHub
                </button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        // 11-qism: Auth mantiqi (Switching)
        function switchAuth(mode) {
            const login = document.getElementById('loginForm');
            const signup = document.getElementById('signupForm');
            const tLogin = document.getElementById('tabLogin');
            const tSignup = document.getElementById('tabSignup');

            if (mode === 'login') {
                login.classList.remove('hidden');
                signup.classList.add('hidden');
                tLogin.className = 'flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 bg-red-600 text-white shadow-lg shadow-red-600/20';
                tSignup.className = 'flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 text-gray-400 hover:text-white';
            } else {
                login.classList.add('hidden');
                signup.classList.remove('hidden');
                tSignup.className = 'flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 bg-red-600 text-white shadow-lg shadow-red-600/20';
                tLogin.className = 'flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 text-gray-400 hover:text-white';
            }
        }

        // URL orqali rejimni aniqlash (index.html dan kelganda)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'signup') switchAuth('signup');

        // Bo'lajak mantiqlar uchun placeholderlar
        function handleLogin() { 
            const email = document.getElementById('emailLogin').value;
            if(email === 'uzb8972@gmail.com') alert("Xush kelibsiz, Behruzbek! (Owner Mode)");
            else alert("Tizimga kirildi!"); 
        }
        function handleSignup() { alert("Ro'yxatdan o'tish muvaffaqiyatli!"); }
    </script>
</body>
</html>
