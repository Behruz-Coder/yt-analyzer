<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Auth | TITAN v2.5</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#050507]">
    <div class="titan-card w-full max-w-md p-10 text-center">
        <h2 id="authTitle" class="text-3xl font-black mb-2">Xush Kelibsiz</h2>
        <p id="authDesc" class="text-gray-500 mb-8 text-sm">TITAN v2.5 ekotizimiga kiring</p>

        <div id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email manzilingiz" 
                   class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-red-600 transition">
            <input type="password" id="password" placeholder="Parol" 
                   class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-red-600 transition">
            <button onclick="handleLogin()" class="w-full py-4 bg-red-600 rounded-xl font-bold hover:bg-red-700 transition shadow-lg shadow-red-600/20">
                Kirish
            </button>
            <p class="text-xs text-gray-600 mt-4 cursor-pointer hover:text-red-500" onclick="toggleOTP()">Parolni unutdingizmi? (OTP yuborish)</p>
        </div>

        <div id="otpForm" class="hidden space-y-4">
            <p class="text-xs text-red-500 mb-4">Emailingizga 6 xonali tasdiqlash kodi yuboriladi</p>
            <input type="text" id="otpCode" placeholder="000 000" maxlength="6"
                   class="w-full p-4 text-center text-2xl tracking-[1rem] rounded-xl bg-white/5 border border-red-600 outline-none">
            <button onclick="verifyOTP()" class="w-full py-4 bg-green-600 rounded-xl font-bold hover:bg-green-700 transition">
                Tasdiqlash
            </button>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient('URL', 'KEY');

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (data.user) {
                // Owner tekshiruvi (Behruzbek uchun)
                if(email === 'uzb8972@gmail.com') {
                    localStorage.setItem('titan_role', 'owner');
                }
                window.location.href = 'index.html';
            } else {
                alert("Xatolik: " + error.message);
            }
        }

        function toggleOTP() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('otpForm').classList.remove('hidden');
            // Supabase orqali OTP yuborish kodi shu yerda bo'ladi
        }
    </script>
</body>
</html>
