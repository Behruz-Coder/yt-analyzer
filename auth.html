<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kirish | TITAN v2.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-titan-bg text-titan-text min-h-screen flex items-center justify-center p-6">

    <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-red-600/5 blur-[120px] rounded-full -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-600/5 blur-[120px] rounded-full -z-10"></div>

    <div class="titan-card w-full max-w-[420px] p-8 md:p-10 animate-fade relative overflow-hidden">
        <div class="flex flex-col items-center mb-10">
            <div onclick="location.href='index.html'" class="w-14 h-14 bg-red-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-red-600/30 cursor-pointer hover:scale-110 transition">
                <span class="text-white font-black text-2xl">T</span>
            </div>
            <h1 class="mt-4 text-2xl font-black tracking-tighter uppercase">Titan <span class="text-red-600">Access</span></h1>
        </div>

        <div class="flex bg-white/5 p-1 rounded-2xl mb-8 border border-white/5">
            <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-3 rounded-xl font-black text-[10px] tracking-widest transition-all bg-red-600 text-white">
                KIRISH
            </button>
            <button id="tabSignup" onclick="switchTab('signup')" class="flex-1 py-3 rounded-xl font-black text-[10px] tracking-widest transition-all text-gray-500 hover:text-white">
                RO'YXATDAN O'TISH
            </button>
        </div>

        <div id="loginForm" class="space-y-4">
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="email" id="emailLogin" placeholder="Email manzilingiz" class="w-full pl-12 pr-4 py-4 rounded-2xl text-sm">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="password" id="passLogin" placeholder="Parolingiz" class="w-full pl-12 pr-4 py-4 rounded-2xl text-sm">
            </div>
            <button onclick="handleLogin()" class="btn-primary w-full py-4 text-xs tracking-[0.2em] mt-2">
                TASDIQLASH <i class="fas fa-sign-in-alt ml-2"></i>
            </button>
        </div>

        <div id="signupForm" class="space-y-4 hidden">
            <div class="relative">
                <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="text" id="nameReg" placeholder="Ismingiz" class="w-full pl-12 pr-4 py-4 rounded-2xl text-sm">
            </div>
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="email" id="emailReg" placeholder="Email manzilingiz" class="w-full pl-12 pr-4 py-4 rounded-2xl text-sm">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="password" id="passReg" placeholder="Yangi parol" class="w-full pl-12 pr-4 py-4 rounded-2xl text-sm">
            </div>
            <button onclick="alert('Ro\'yxatdan o\'tish muvaffaqiyatli!')" class="btn-primary w-full py-4 text-xs tracking-[0.2em] mt-2 bg-blue-600">
                HISOB YARATISH <i class="fas fa-user-plus ml-2"></i>
            </button>
        </div>

        <div class="mt-10 pt-8 border-t border-white/5">
            <p class="text-center text-[9px] font-black text-gray-600 uppercase tracking-[0.3em] mb-6">Yoki ijtimoiy tarmoqlar orqali</p>
            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-3 py-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition text-[10px] font-bold uppercase">
                    <img src="https://www.svgrepo.com/show/303108/google-icon-logo.svg" class="w-4 h-4"> Google
                </button>
                <button class="flex items-center justify-center gap-3 py-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition text-[10px] font-bold uppercase">
                    <i class="fab fa-github text-base"></i> GitHub
                </button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        // Tab switching mantiqi (faqat shu sahifa uchun)
        function switchTab(mode) {
            const login = document.getElementById('loginForm');
            const signup = document.getElementById('signupForm');
            const tLogin = document.getElementById('tabLogin');
            const tSignup = document.getElementById('tabSignup');

            if (mode === 'login') {
                login.classList.remove('hidden');
                signup.classList.add('hidden');
                tLogin.className = 'flex-1 py-3 rounded-xl font-black text-[10px] tracking-widest transition-all bg-red-600 text-white';
                tSignup.className = 'flex-1 py-3 rounded-xl font-black text-[10px] tracking-widest transition-all text-gray-500 hover:text-white';
            } else {
                login.classList.add('hidden');
                signup.classList.remove('hidden');
                tSignup.className = 'flex-1 py-3 rounded-xl font-black text-[10px] tracking-widest transition-all bg-red-600 text-white';
                tLogin.className = 'flex-1 py-3 rounded-xl font-black text-[10px] tracking-widest transition-all text-gray-500 hover:text-white';
            }
        }
    </script>
</body>
</html>
