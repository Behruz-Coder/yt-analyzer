<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>YT-PRO | ROOT TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .glitch { border: 1px solid #0f0; box-shadow: 0 0 10px #0f0; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-10">
    <div id="auth" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">
        <h2 class="mb-5 tracking-widest animate-pulse">SYSTEM ACCESS REQUIRED</h2>
        <input type="password" id="pass" class="bg-black border-b border-green-500 text-center text-2xl outline-none mb-5">
        <button onclick="login()" class="border border-green-500 px-10 py-2 hover:bg-green-500 hover:text-black transition">ENTER</button>
    </div>

    <div id="main" class="max-w-6xl mx-auto hidden">
        <header class="flex justify-between border-b border-green-900 pb-5 mb-10">
            <h1 class="text-2xl font-bold">PRO_ROOT_v1.2</h1>
            <span id="status" class="text-xs">○ WAITING...</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glitch p-6 rounded bg-black/50">
                <h3 class="text-xs mb-4 text-green-700">LIVE_NODE_LOGS</h3>
                <div id="logs" class="h-[500px] overflow-y-auto space-y-2 text-[10px]"></div>
                <button onclick="loadLogs()" class="w-full mt-4 border border-green-800 py-2 hover:bg-green-900">REFRESH</button>
            </div>
            <div class="space-y-6">
                <div class="glitch p-6 rounded">
                    <h3 class="text-xs mb-4 text-green-700">FIREWALL_CONFIG</h3>
                    <input type="text" id="word" class="w-full bg-transparent border border-green-900 p-2 text-xs mb-3 outline-none" placeholder="Keyword...">
                    <button onclick="addWord()" class="w-full bg-green-900 text-black font-bold py-2 text-xs">INJECT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "/.netlify/functions/get-yt-data";
        let PASS = "";

        function login() {
            PASS = document.getElementById('pass').value;
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            loadLogs();
        }

        async function loadLogs() {
            document.getElementById('status').innerText = "○ CONNECTING...";
            const res = await fetch(API, { method:'POST', body: JSON.stringify({ action:'get_logs', password:PASS })});
            const logs = await res.json();
            const cont = document.getElementById('logs');
            cont.innerHTML = logs.map(l => `
                <div class="flex justify-between items-center border-b border-green-900/30 py-2">
                    <span>> ${l.channel_username} <span class="opacity-30">[${l.ip_address}]</span></span>
                    <div class="flex gap-2">
                        <button onclick="act('${l.ip_address}', 'toggle_block')" class="text-red-500 hover:underline">BLOCK</button>
                        <button onclick="act('${l.ip_address}', 'whitelist_ip')" class="text-blue-500 hover:underline">UNBLOCK</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('status').innerText = "● ONLINE";
        }

        async function act(ip, type) {
            await fetch(API, { method:'POST', body: JSON.stringify({ action:type, password:PASS, ip_address:ip })});
            alert("EXECUTED");
            loadLogs();
        }

        async function addWord() {
            const w = document.getElementById('word').value;
            await fetch(API, { method:'POST', body: JSON.stringify({ action:'add_badword', password:PASS, word:w })});
            alert("INJECTED");
            document.getElementById('word').value = "";
        }
    </script>
</body>
</html>
