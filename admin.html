<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | TITAN v2.5</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020204] text-white p-8">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black text-red-600">Admin Control <span class="text-white font-light text-sm">@operator_878</span></h1>
        <button onclick="location.href='index.html'" class="px-4 py-2 bg-white/10 rounded-lg">Saytga qaytish</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="titan-card">
            <h3 class="font-bold mb-4 border-b border-white/10 pb-2">Taqiqlangan so'zlar</h3>
            <div class="flex gap-2 mb-4">
                <input type="text" id="newWord" class="bg-white/5 border border-white/10 p-2 rounded flex-grow text-sm outline-none">
                <button onclick="addBadWord()" class="bg-red-600 px-4 rounded">+</button>
            </div>
            <div id="wordsList" class="space-y-2 h-40 overflow-y-auto text-xs text-gray-400">
                </div>
        </div>

        <div class="titan-card">
            <h3 class="font-bold mb-4 border-b border-white/10 pb-2">User Management</h3>
            <div id="userList" class="space-y-3">
                <div class="flex justify-between items-center text-sm p-2 bg-white/5 rounded">
                    <span>User: #titan_992</span>
                    <button class="text-red-500">Block IP</button>
                </div>
            </div>
        </div>

        <div class="titan-card">
            <h3 class="font-bold mb-4 border-b border-white/10 pb-2">Server Status</h3>
            <p class="text-green-500 text-sm">● YouTube API: Active</p>
            <p class="text-green-500 text-sm mt-2">● Database: Connected</p>
            <p class="text-gray-400 text-xs mt-4">Jami qidiruvlar: 14,201</p>
        </div>
    </div>
</body>
</html>
